name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest
    env:
      # Build never connects to a DB (admin/DB pages are force-dynamic), but
      # Prisma's datasource URL must be a valid value at generate/build time.
      DATABASE_URL: postgresql://user:pass@localhost:5432/kulas?schema=public
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <linearGradient id="jar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a0a06"/>
      <stop offset="1" stop-color="#1a0503"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0341a"/>
      <stop offset="1" stop-color="#7a1006"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#0d0d0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ff5a36" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff5a36" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chili" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b1f"/>
      <stop offset="1" stop-color="#c1121f"/>
    </linearGradient>
  </defs>

  <ellipse cx="300" cy="400" rx="260" ry="300" fill="url(#glow)"/>

  <!-- Chili on top -->
  <g transform="rotate(-18 300 150)">
    <path d="M180 150 q120 -46 230 -8 q22 8 6 22 q-110 40 -230 8 q-20 -6 -6 -22 z" fill="url(#chili)"/>
    <path d="M406 138 q22 -18 40 -10 q-10 18 -32 24 z" fill="#2f7d32"/>
  </g>

  <!-- Lid -->
  <rect x="196" y="196" width="208" height="86" rx="18" fill="url(#lid)"/>
  <rect x="196" y="196" width="208" height="14" rx="7" fill="#F4B400" opacity="0.85"/>

  <!-- Jar body -->
  <rect x="176" y="278" width="248" height="452" rx="40" fill="url(#jar)"/>
  <!-- Sauce fill visible through glass at top -->
  <rect x="196" y="298" width="208" height="70" rx="24" fill="url(#sauce)"/>
  <!-- Label -->
  <rect x="196" y="430" width="208" height="260" rx="20" fill="#0d0d0f"/>
  <text x="300" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#ffffff" font-style="italic">Kulas</text>
  <text x="300" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="3" fill="#ffffff">CHILI GARLIC</text>
  <text x="300" y="612" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="6" fill="#F4B400">SAUCE</text>
  <circle cx="300" cy="656" r="16" fill="url(#chili)"/>

  <!-- Glass highlight -->
  <rect x="196" y="300" width="26" height="420" rx="13" fill="#ffffff" opacity="0.06"/>
</svg>

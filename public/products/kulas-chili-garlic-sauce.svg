<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a1008"/>
      <stop offset="0.5" stop-color="#7c1e0c"/>
      <stop offset="1" stop-color="#320a04"/>
    </linearGradient>
    <linearGradient id="oil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8a53a"/>
      <stop offset="1" stop-color="#b5300f"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#050506"/>
      <stop offset="0.5" stop-color="#33333a"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ff5a36" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff5a36" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chili" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ff4324"/>
      <stop offset="0.5" stop-color="#e01e12"/>
      <stop offset="1" stop-color="#a30f10"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#F4B400"/>
      <stop offset="1" stop-color="#FF5A36"/>
    </linearGradient>
  </defs>

  <ellipse cx="300" cy="440" rx="270" ry="300" fill="url(#glow)"/>

  <!-- Chili resting diagonally across the lid -->
  <g transform="rotate(-14 300 205)">
    <path d="M150 205 q140 -52 268 -12 q30 10 8 26 q-124 46 -268 12 q-26 -8 -8 -26 z" fill="url(#chili)"/>
    <path d="M96 214 q22 -6 54 -9 l0 22 q-30 -1 -52 -4 q-14 -3 -2 -9 z" fill="#c1121f"/>
    <path d="M418 191 q26 -22 48 -12 q-10 22 -38 28 z" fill="#2f7d32"/>
    <ellipse cx="250" cy="196" rx="70" ry="7" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- Metal screw lid -->
  <rect x="168" y="250" width="264" height="98" rx="20" fill="url(#lid)"/>
  <rect x="176" y="262" width="248" height="6" rx="3" fill="#ffffff" opacity="0.14"/>
  <rect x="176" y="330" width="248" height="6" rx="3" fill="#000000" opacity="0.4"/>

  <!-- Glass jar body (squat) -->
  <path d="M176 360
           q0 -16 16 -16 l216 0 q16 0 16 16
           l0 300 q0 44 -44 44 l-160 0 q-44 0 -44 -44 z"
        fill="url(#glass)"/>
  <!-- Oil/sauce meniscus near the neck -->
  <rect x="188" y="360" width="224" height="30" rx="12" fill="url(#oil)" opacity="0.9"/>

  <!-- Black wrap label -->
  <rect x="188" y="452" width="224" height="240" rx="16" fill="#0c0c0e"/>
  <rect x="188" y="452" width="224" height="240" rx="16" fill="url(#glass)" opacity="0.08"/>

  <!-- Script wordmark -->
  <text x="300" y="556" text-anchor="middle" font-family="'Brush Script MT','Segoe Script',cursive" font-size="72" fill="#ffffff">Kulas</text>
  <!-- Product name -->
  <text x="300" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="23" letter-spacing="2" fill="#ffffff">CHILI GARLIC SAUCE</text>

  <!-- Emblem: garlic + flame + chili -->
  <g transform="translate(300 650)">
    <path d="M0 -8 q-14 0 -14 14 q0 12 14 16 q14 -4 14 -16 q0 -14 -14 -14 z" fill="#f3f3ef"/>
    <path d="M0 -8 q-4 8 0 30 M-6 -4 q-3 8 -1 26 M6 -4 q3 8 1 26" stroke="#cfcfc7" stroke-width="1.4" fill="none"/>
    <path d="M6 4 q10 -22 22 -26 q-2 14 -8 22 q10 -4 16 -10 q-4 16 -20 22 q-10 3 -18 -4 z" fill="url(#flame)"/>
    <path d="M14 18 q22 -6 40 4 q-18 12 -42 8 q-8 -6 2 -12 z" fill="url(#chili)"/>
  </g>

  <!-- Glass highlight -->
  <rect x="196" y="362" width="20" height="330" rx="10" fill="#ffffff" opacity="0.07"/>
  <rect x="392" y="380" width="10" height="300" rx="5" fill="#000000" opacity="0.25"/>
</svg>
